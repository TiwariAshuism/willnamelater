global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: prod

scrape_configs:
  # Application metrics arrive as OTLP at the collector, which re-exposes them here.
  # The app itself never learns that Prometheus exists — it speaks OTLP and nothing
  # else, which is what lets the backend be swapped without touching code.
  - job_name: influaudit
    static_configs:
      - targets: ["otel-collector:8889"]

  # Host: disk, memory, load. The usual cause of a single VM falling over, and the
  # one thing application metrics cannot see coming.
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: caddy
    static_configs:
      - targets: ["caddy:2019"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
