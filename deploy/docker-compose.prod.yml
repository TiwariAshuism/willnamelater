# Production stack. One VM, one docker compose, managed data tier.
#
# EVERY IMAGE HERE IS PINNED TO AN EXACT VERSION, and that is not fussiness.
# The observability images were briefly on `:latest`, and validating them against the
# real binaries caught it: the then-current grafana/tempo:latest had DROPPED the
# top-level `ingester` and `compactor` config keys, so tempo.yml — valid on 2.7.2 —
# fails to parse on it. On `:latest` that surfaces as the monitoring tier refusing to
# start, at deploy time, without a single line of this repository having changed.
#
# The tier you rely on to tell you what is broken is the worst possible place to accept
# an unannounced upgrade. Bump these deliberately, and re-run the config validation.
#
#   docker compose -f deploy/docker-compose.prod.yml --env-file /run/influaudit/.env <cmd>
#
# Normally you do not run this by hand — deploy/scripts/deploy.sh does, and it
# verifies image signatures and runs migrations first. See deploy/ARCHITECTURE.md.
#
# This is a STANDALONE file, not an overlay on docker-compose.yml. Prod REMOVES
# three services the dev stack runs (postgres, redis, localstack) in favour of
# managed ones, and a compose overlay cannot remove a service — it can only add to
# or amend one. Two honest files beat one file plus a pile of `replicas: 0` tricks,
# and it leaves the dev file free to stay optimized for `make up`.
#
# Nothing here is cloud-specific. The images come from GHCR, the object store is
# reached over the S3 API, and Postgres and Redis are reached over the wire by DSN
# and host:port. Moving clouds changes the VALUES below, never this file.

name: influaudit

x-backend-env: &backend-env
  INFLUAUDIT_ENVIRONMENT: prod

  # --- Managed data tier. Both are reached across a network, so both are TLS. ---
  # sslmode=require is enforced by config.Validate in prod: a DSN without it puts
  # the database password on the wire.
  INFLUAUDIT_POSTGRES__DSN: ${INFLUAUDIT_POSTGRES__DSN:?managed Postgres DSN is required}
  INFLUAUDIT_REDIS__ADDR: ${INFLUAUDIT_REDIS__ADDR:?managed Redis host:port is required}
  INFLUAUDIT_REDIS__PASSWORD: ${INFLUAUDIT_REDIS__PASSWORD:-}
  # Every managed Redis is TLS-only. config.Validate refuses to boot prod without
  # this, and until the platform/redis package grew a TLSConfig it was not even
  # possible to connect to one.
  INFLUAUDIT_REDIS__TLS: "true"

  # --- Reached inside the compose network. Never published to the host. ---
  INFLUAUDIT_HTTP__ADDR: ":8080"
  INFLUAUDIT_GOTENBERG__URL: http://gotenberg:3000
  INFLUAUDIT_ML__BASE_URL: http://ml:8000
  INFLUAUDIT_OTEL__EXPORTER_ENDPOINT: otel-collector:4317

  # The origin OAuth providers redirect back to. It cannot be derived from the
  # bind address (which is behind Caddy) and must match the redirect URIs
  # registered with Meta and Google, or every callback dies. config.Validate
  # rejects a non-https or localhost value in prod, because the default is
  # localhost and an emptiness check would never catch a deployment that forgot it.
  INFLUAUDIT_HTTP__PUBLIC_BASE_URL: ${INFLUAUDIT_HTTP__PUBLIC_BASE_URL:?public API origin is required}

  # --- Object storage: S3-compatible, and deliberately NOT on the compute cloud. ---
  # Cloudflare R2 by default (region "auto", zero egress fees). The SigV4 client is
  # generic, so this works unchanged against AWS S3, MinIO, or GCS in interop mode.
  # Because the store is outside all three clouds, object storage is not a step in
  # a cloud migration at all — nothing to copy, no URLs to re-mint.
  INFLUAUDIT_STORAGE__ENDPOINT: ${INFLUAUDIT_STORAGE__ENDPOINT:?object storage endpoint is required}
  INFLUAUDIT_STORAGE__REGION: ${INFLUAUDIT_STORAGE__REGION:-auto}
  INFLUAUDIT_STORAGE__BUCKET: ${INFLUAUDIT_STORAGE__BUCKET:?object storage bucket is required}
  INFLUAUDIT_STORAGE__ACCESS_KEY: ${INFLUAUDIT_STORAGE__ACCESS_KEY:?object storage access key is required}
  INFLUAUDIT_STORAGE__SECRET_KEY: ${INFLUAUDIT_STORAGE__SECRET_KEY:?object storage secret key is required}
  INFLUAUDIT_STORAGE__PATH_STYLE: ${INFLUAUDIT_STORAGE__PATH_STYLE:-true}

  # --- Secrets. All from the SOPS-encrypted env file; none on disk unencrypted. ---
  # The JWT key is supplied INLINE rather than as a path: prod has no mounted .pem,
  # no secrets volume, and no key file to leak or forget to rotate.
  INFLUAUDIT_JWT__PRIVATE_KEY_PEM: ${INFLUAUDIT_JWT__PRIVATE_KEY_PEM:?JWT signing key is required}
  # Seals OAuth tokens at rest. It CANNOT be rotated without re-encrypting
  # oauth_connections, so it must be carried across a cloud migration unchanged.
  # See deploy/MIGRATION.md — this is the one piece of state that lives in neither
  # Postgres nor object storage.
  INFLUAUDIT_CRYPTO__MASTER_KEY: ${INFLUAUDIT_CRYPTO__MASTER_KEY:?master encryption key is required}
  INFLUAUDIT_ANTHROPIC__API_KEY: ${INFLUAUDIT_ANTHROPIC__API_KEY:?}
  INFLUAUDIT_ML__SERVICE_TOKEN: ${INFLUAUDIT_ML__SERVICE_TOKEN:?}
  INFLUAUDIT_RAZORPAY__KEY_ID: ${INFLUAUDIT_RAZORPAY__KEY_ID:?}
  INFLUAUDIT_RAZORPAY__KEY_SECRET: ${INFLUAUDIT_RAZORPAY__KEY_SECRET:?}
  INFLUAUDIT_RAZORPAY__WEBHOOK_SECRET: ${INFLUAUDIT_RAZORPAY__WEBHOOK_SECRET:?}

  # --- Transactional mail. Any SMTP relay; no provider SDK, no cloud identity. ---
  INFLUAUDIT_EMAIL__HOST: ${INFLUAUDIT_EMAIL__HOST:?mail relay host is required}
  INFLUAUDIT_EMAIL__PORT: ${INFLUAUDIT_EMAIL__PORT:-587}
  INFLUAUDIT_EMAIL__USERNAME: ${INFLUAUDIT_EMAIL__USERNAME:-}
  INFLUAUDIT_EMAIL__PASSWORD: ${INFLUAUDIT_EMAIL__PASSWORD:-}
  INFLUAUDIT_EMAIL__FROM: ${INFLUAUDIT_EMAIL__FROM:?mail from address is required}
  INFLUAUDIT_EMAIL__FROM_NAME: ${INFLUAUDIT_EMAIL__FROM_NAME:-InfluAudit}
  INFLUAUDIT_EMAIL__TLS: ${INFLUAUDIT_EMAIL__TLS:-starttls}

  # Connector credentials, referenced by NAME from packages/config/connectors.yaml.
  # The app never learns where they came from — it asks for them by name.
  YT_API_KEY: ${YT_API_KEY:-}
  YT_OAUTH_CLIENT_ID: ${YT_OAUTH_CLIENT_ID:-}
  YT_OAUTH_CLIENT_SECRET: ${YT_OAUTH_CLIENT_SECRET:-}
  META_APP_ID: ${META_APP_ID:-}
  META_APP_SECRET: ${META_APP_SECRET:-}

x-images: &version ${VERSION:?the image tag to deploy is required}

services:
  # The only service bound to a public port. Everything else is reachable only on
  # the compose network.
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddy substitutes {$VAR} in the Caddyfile at load. Each is a site address, so
      # a missing one would make Caddy serve that site on the literal string.
      ACME_EMAIL: ${ACME_EMAIL:?}
      API_DOMAIN: ${API_DOMAIN:?}
      APP_DOMAIN: ${APP_DOMAIN:?}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN:-grafana.influaudit.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # caddy-data holds the Let's Encrypt certificates and account key. Back it up:
      # restoring it onto the new VM during a migration means the new host serves
      # TLS from the first second, with no ACME round-trip at cutover.
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

  api:
    image: ghcr.io/getnyx/influaudit-backend:${VERSION:?}
    restart: unless-stopped
    environment: *backend-env
    healthcheck:
      # The image is distroless: no shell, no curl. cmd/healthcheck is a static
      # binary built into it for exactly this.
      test: ["CMD", "/usr/local/bin/healthcheck", "-url", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      ml:
        condition: service_healthy

  worker:
    image: ghcr.io/getnyx/influaudit-backend:${VERSION:?}
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/worker"]
    environment: *backend-env
    depends_on:
      ml:
        condition: service_healthy

  web:
    image: ghcr.io/getnyx/influaudit-web:${VERSION:?}
    restart: unless-stopped
    environment:
      # The browser never talks to the API directly: the web server proxies, so it
      # reaches the API over the private compose network by service name.
      API_BASE_URL: http://api:8080/v1
      APP_BASE_URL: ${APP_BASE_URL:?the public web origin is required}
      SESSION_COOKIE_SECURE: "true"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  ml:
    image: ghcr.io/getnyx/influaudit-ml:${VERSION:?}
    restart: unless-stopped
    environment:
      INFLUAUDIT_ML_SERVICE_TOKEN: ${INFLUAUDIT_ML__SERVICE_TOKEN:?}
      INFLUAUDIT_BACKEND_BASE_URL: http://api:8080
      INFLUAUDIT_ML_ARTIFACTS: /var/lib/ml-artifacts
    volumes:
      # The promoted champion model. deploy/scripts/sync-artifacts.sh pulls it from
      # object storage after a promotion; empty means the registry falls back to the
      # cold-start heuristic, which is a correct state, not a broken one.
      - ml-artifacts:/var/lib/ml-artifacts
    # Healthcheck is baked into the image.

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:3000/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  # Receives OTLP from the api and worker and fans it out. This indirection is the
  # insurance policy: the app only ever speaks OTLP, so switching the observability
  # backend — to Grafana Cloud, Honeycomb, Datadog, or a cloud-native service — is
  # an exporter block in this collector's config and NOT a code change. Do not give
  # that up by pointing the app at a vendor endpoint directly.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro

  # --- Observability. Self-hosted, and that is the point. -----------------------
  #
  # Cloud Monitoring / Azure Monitor / CloudWatch are the most seductive lock-in in
  # the whole stack: one checkbox to enable, and then your dashboards, your alert
  # rules, your on-call runbooks, and your team's muscle memory are all cloud
  # property. Migrating them is a rewrite, and it comes due at exactly the moment
  # you are least able to afford one.
  #
  # Meanwhile the traffic is one VM. A planet-scale TSDB is not the requirement.
  #
  # The escape hatch stays open regardless: the app speaks only OTLP, so pointing
  # this at Grafana Cloud or Honeycomb later is an exporter block in
  # otel-collector.yaml — not a code change. See that file.

  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki.yml:/etc/loki/config.yaml:ro
      - loki-data:/loki

  # Without this, Loki runs, the datasource resolves, the dashboards are green — and
  # there are no logs in any of them. See promtail.yml.
  promtail:
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./promtail.yml:/etc/promtail/config.yaml:ro
      # Read-only, and only to DISCOVER containers and read their json-file logs.
      # promtail never starts, stops, or inspects anything it is not reading.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo.yml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo

  grafana:
    image: grafana/grafana:11.5.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN:-grafana.influaudit.com}

      # Alerts go out through the SAME relay the application uses. Grafana does not
      # need a cloud identity to tell you the site is down.
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${INFLUAUDIT_EMAIL__HOST:?}:${INFLUAUDIT_EMAIL__PORT:-587}
      GF_SMTP_USER: ${INFLUAUDIT_EMAIL__USERNAME:-}
      GF_SMTP_PASSWORD: ${INFLUAUDIT_EMAIL__PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${INFLUAUDIT_EMAIL__FROM:?}
      GF_SMTP_FROM_NAME: InfluAudit Alerts

      # Substituted into provisioning/alerting/contactpoints.yml.
      ALERT_EMAIL: ${ALERT_EMAIL:?where alerts are delivered}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      # Datasources and dashboards are provisioned FROM GIT, not clicked together in
      # the UI. That is what makes them survive the VM, and what makes them exist
      # already on the new host on migration day.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  # Host metrics: disk, memory, load. The one thing an app-level exporter cannot see
  # coming, and the usual cause of a VM falling over.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave

  # One-shot. Deliberately has NO depends_on and is NOT started by `up`:
  # deploy.sh runs it explicitly with `run --rm migrate` and aborts the deploy on a
  # non-zero exit, BEFORE the new containers start.
  #
  # It must not be a `service_completed_successfully` dependency of api/worker the
  # way it is in dev, because that re-runs it on every `up` — and on a ROLLBACK
  # that would try to apply the new schema using the old image.
  migrate:
    image: ghcr.io/getnyx/influaudit-backend:${VERSION:?}
    entrypoint: ["/usr/local/bin/migrate"]
    environment: *backend-env
    restart: "no"
    profiles: ["tools"]

volumes:
  # Holds the Let's Encrypt certificates and ACME account key. BACK THIS UP:
  # restoring it onto the new VM means the new host serves TLS from its first
  # second, with no ACME round-trip at the moment of cutover.
  caddy-data:
  caddy-config:
  # The promoted champion model. Empty means the registry falls back to the
  # cold-start heuristic — a correct state, but not the one that was serving.
  ml-artifacts:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
