# Local development infrastructure for InfluAudit.
#
# Phase 1: only stateful/third-party dependencies run in containers. The Go
# backend (services/backend) and the Python ML service (services/ml) run on the
# host against these services, so no application images are referenced here yet
# — their Dockerfiles do not exist. Add backend/ml services once those images
# land.
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
#   docker compose -f deploy/docker-compose.yml down

name: influaudit

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-influaudit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-influaudit}
      POSTGRES_DB: ${POSTGRES_DB:-influaudit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # -U/-d avoid pg_isready reporting "no attempt made" on the default role.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-influaudit} -d ${POSTGRES_DB:-influaudit}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    # appendonly gives durable queues for asynq across restarts.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "${GOTENBERG_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:3000/health"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
