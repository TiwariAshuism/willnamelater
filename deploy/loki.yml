# Single-binary Loki on a filesystem. At one VM this is the right size: the
# microservice deployment mode exists for a scale that is several years away, and
# adopting it now would mean operating a distributed log store to serve one host.
#
# Logs arrive because every container writes to stdout and Docker's loki driver (or
# promtail, if preferred) ships them. The application never writes a log file, never
# calls a cloud logging SDK, and never learns where its output ends up — which is
# exactly why moving clouds does not move the logging.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h # 30 days. The VM's disk is not large and logs are not the product.
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
