# Traces. The collector forwards OTLP here (see otel-collector.yaml).
#
# The application already emits OTLP spans — telemetry.Setup wires an OTLP/gRPC
# exporter and nothing else — so this backend was reachable the moment a collector
# existed. Swapping it for Grafana Cloud, Honeycomb, or Datadog is an exporter block
# in the collector, not a code change. Keep it that way.

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h # 7 days. Traces are for debugging last week, not last quarter.

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
