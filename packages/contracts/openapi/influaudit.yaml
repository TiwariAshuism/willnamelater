          type: string
        tier:
          type: string
        verification_tier:
          type: string
      required:
      - authenticity
      - overall
      type: object
    report.PublishResult:
      properties:
        badge_url:
          type: string
        expires_at:
          type: string
        pdf_url:
          type: string
        public_slug:
          type: string
      required:
      - badge_url
      - pdf_url
      - public_slug
      type: object
    report.Report:
      properties:
        audit_id:
          type: string
        finished_at:
          type: string
        fraud:
          $ref: "#/components/schemas/report.FraudBlock"
        influencer_id:
          type: string
        narrative:
          $ref: "#/components/schemas/report.Narrative"
        narrative_available:
          type: boolean
        platforms:
          items:
            type: string
          type: array
        score:
          $ref: "#/components/schemas/report.ScoreBlock"
        status:
          type: string
      required:
      - audit_id
      - fraud
      - influencer_id
      - narrative
      - narrative_available
      - platforms
      - score
      - status
      type: object
    report.ScoreBlock:
      properties:
        authenticity:
          type: number
        available:
          type: boolean
        benchmark_label:
          type: string
        niche:
          type: string
        overall:
          type: number
        subscores:
          items:
            $ref: "#/components/schemas/report.Subscore"
          type: array
        tier:
          type: string
        verification_tier:
          type: string
      required:
      - authenticity
      - available
      - overall
      - subscores
      type: object
    report.Subscore:
      properties:
        confidence:
          type: number
        name:
          type: string
        value:
          type: number
      required:
      - confidence
      - name
      - value
      type: object
    report.WeaknessFix:
      properties:
        fix:
          type: string
        weakness:
          type: string
      required:
      - fix
      - weakness
      type: object
    scoring.ScoreHistoryResponse:
      properties:
        influencer_id:
          type: string
        points:
          items:
            $ref: "#/components/schemas/scoring.ScorePoint"
          type: array
      required:
      - influencer_id
      - points
      type: object
    scoring.ScorePoint:
      properties:
        audit_job_id:
          type: string
        confidence:
          type: number
        created_at:
          format: date-time
          type: string
        overall:
          type: number
      required:
      - audit_job_id
      - confidence
      - created_at
      - overall
      type: object
    scoring.ScoreResponse:
      properties:
        audit_job_id:
          type: string
        benchmark_label:
          type: string
        benchmark_version:
          type: integer
        confidence:
          type: number
        contributing_platforms:
          items:
            type: string
          type: array
        created_at:
          format: date-time
          type: string
        influencer_id:
          type: string
        niche:
          type: string
        overall:
          type: number
        subscores:
          additionalProperties:
            $ref: "#/components/schemas/scoring.Subscore"
          type: object
        tier:
          type: string
        verification_tier:
          type: string
        weights_version:
          type: integer
      required:
      - audit_job_id
      - benchmark_label
      - benchmark_version
      - confidence
      - contributing_platforms
      - created_at
      - niche
      - overall
      - subscores
      - tier
      - verification_tier
      - weights_version
      type: object
    scoring.Subscore:
      properties:
        confidence:
          type: number
        value:
          type: number
      required:
      - confidence
      - value
      type: object
    whitelabel.UpdateWhitelabelRequest:
      properties:
        brand_name:
          type: string
        custom_domain:
          type: string
        logo_url:
          type: string
        primary_color:
          type: string
      required:
      - brand_name
      - custom_domain
      - logo_url
      - primary_color
      type: object
    whitelabel.WhitelabelResponse:
      properties:
        brand_name:
          type: string
        custom_domain:
          type: string
        logo_url:
          type: string
        primary_color:
          type: string
        updated_at:
          format: date-time
          type: string
      required:
      - brand_name
      - custom_domain
      - logo_url
      - primary_color
      - updated_at
      type: object
