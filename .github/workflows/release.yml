# Builds, signs, and publishes the three service images to GHCR.
#
# GHCR — not ECR, GCR, or ACR. The registry is where a deployment quietly welds
# itself to a cloud: the pull credentials become cloud IAM, the image URLs become
# cloud hostnames, and a migration then needs a full re-push and a credential
# rewrite before it can even begin. GHCR needs no cloud account to push (the
# job's own GITHUB_TOKEN suffices), is pullable from a VM on any cloud, and costs
# nothing to keep. Moving clouds does not move the registry.
#
# This workflow publishes. It does not deploy — see deploy.yml.

name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      # Cosign signs keylessly against this job's OIDC identity: there is no
      # private key to store, leak, or rotate. The signature attests that this
      # image came from THIS workflow, in THIS repository, at THIS commit — which
      # is exactly what deploy.sh verifies before it pulls.
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # The backend context is the repository root: the image needs
          # packages/config/connectors.yaml, which lives outside the Go module.
          # One image, four binaries — api, worker, migrate, healthcheck — and the
          # entrypoint selects among them, so api and worker can never drift apart.
          - name: backend
            context: .
            dockerfile: services/backend/Dockerfile
          - name: ml
            context: ./services/ml
            dockerfile: services/ml/Dockerfile
          # Also the repository root: pnpm workspace, needs the root lockfile and
          # packages/contracts.
          - name: web
            context: .
            dockerfile: apps/web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/influaudit-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Closes the version-stamping gap: services/backend/Dockerfile threads
          # this into -X app.Version, so /healthz reports the exact commit that
          # produced the running binary. Nothing set it before, so every image
          # ever built reported "dev".
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Signing by digest, not by tag: a tag is mutable and can be repointed at
      # an image that was never signed.
      - name: Sign the image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/influaudit-${{ matrix.name }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
