name: backend

on:
  push:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: services/backend/go.sum

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: services/backend

      - name: go test
        run: go test ./...
